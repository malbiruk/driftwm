# driftwm TEST config — nested session için
# Canlı config'e dokunmadan özellikleri test etmek için kullan

mod_key = "alt"   # nested'da super host compositor tarafından kapılır, alt kullan
focus_follows_mouse = true

autostart = ["kitty"]   # nested session başlar başlamaz kitty aç

[background]
shader_path = "/home/laa/.config/driftwm/fast_smoke.glsl"

[decorations]
bg_color      = "#1e1e2e"
fg_color      = "#cdd6f4"
corner_radius = 10

[navigation]
friction        = 0.93
animation_speed = 0.3

[keybindings]
"mod+return"       = "exec kitty"
"mod+shift+q"      = "close-window"
"mod+ctrl+shift+q" = "quit"
"mod+f"            = "toggle-fullscreen"
"mod+shift+return" = "exec kitty"   # yedek: alt+shift+enter

# --- opacity testi (transparent glitch fix) ---
[[window_rules]]
app_id  = "kitty"
opacity = 0.85

# --- Window Rules v2 örnekleri ---

