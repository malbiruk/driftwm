[preferred]
# Fallback for all portals not listed below: use GTK (file chooser, app chooser,
# open/save dialogs, print, notifications, etc.)
default=gtk

# Screen capture: handled by xdg-desktop-portal-hyprland (supports per-window sharing).
# Screenshot: xdg-desktop-portal-hyprland handles both output and window screenshots.
org.freedesktop.impl.portal.ScreenCast=hyprland
org.freedesktop.impl.portal.Screenshot=hyprland

# Secrets: prefer gnome-keyring when available, fall back to gtk.
org.freedesktop.impl.portal.Secret=gnome-keyring;gtk

# Inhibit (screen idle/suspend suppression) is not implemented by xdpw; use gtk.
org.freedesktop.impl.portal.Inhibit=gtk

# File/app/account choosers → GTK dialogs.
org.freedesktop.impl.portal.FileChooser=gtk
org.freedesktop.impl.portal.AppChooser=gtk
org.freedesktop.impl.portal.Account=gtk
