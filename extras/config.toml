# driftwm — example "home dashboard" rice
#
# An opinionated starting point: a single Astal dashboard pinned at the canvas
# origin (your "home"), plus power-canvas defaults. Install with
# `extras/install.sh`. Everything here is optional — `config.reference.toml`
# documents every setting, and partial configs merge with built-in defaults, so
# trim this to taste.

autostart = [
    "swaync",                                      # notification daemon
    "swayosd-server --top-margin 0.95",            # volume/brightness OSD
    "ags run ~/.config/driftwm/astal",             # the home dashboard (Astal)
    "~/.config/driftwm/scripts/battery_notify.sh", # low-battery alert
    "swayidle -w timeout 300 'brightnessctl -s set 10%' resume 'brightnessctl -r' timeout 600 'systemctl suspend' before-sleep 'swaylock'",
    "sway-audio-idle-inhibit",                     # don't idle while audio plays
    # polkit agent (binary path varies by distro), e.g.:
    # "/usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1",
]

# Sloppy focus: windows don't overlap, so a cursor over a window is deliberate.
# Pairs with hover -> `mod+c` / 4-finger hold to target windows when zoomed out.
focus_follows_mouse = true

# Place a new window adjacent to the focused window's cluster.
window_placement = "auto"

# Background defaults to the dot-grid shader. To set a wallpaper instead:
# [background]
# type = "wallpaper"   # screen-fixed image (cheapest); or "tile" / "shader"
# path = "~/Pictures/wallpaper.jpg"

[snap]
corners = true
centers = true

[zoom]
reset_on_new_window = false

[mouse]
decoration_resize_snapped = true
decoration_fit_snapped = true

[decorations]
# Borders over shadows: a soft shadow is low-contrast on the dark grid, where a
# crisp border reads more clearly.
shadow = false
border_width = 2
border_color = "#303030"          # unfocused: subtle, matches the title bar
border_color_focused = "#ffffff"  # focused: pops against the dark grid

# Multiple layouts make the dashboard's layout indicator meaningful. Example:
# [input.keyboard]
# layout = "us,ru"
# options = "grp:caps_toggle,grp_led:caps"

[keybindings]
"mod+n" = "spawn swaync-client -t"
"mod+s" = "exec ~/.config/driftwm/scripts/window-search.sh"
# Cluster-first: the unshifted key acts on the snapped cluster (the defaults are
# single-window).
"mod+m" = "fit-window-snapped"
"mod+shift+m" = "fit-window"
# Route media keys through swayosd for on-screen feedback.
"XF86AudioRaiseVolume" = "spawn swayosd-client --output-volume raise"
"XF86AudioLowerVolume" = "spawn swayosd-client --output-volume lower"
"XF86AudioMute" = "spawn swayosd-client --output-volume mute-toggle"
"XF86MonBrightnessUp" = "spawn swayosd-client --brightness raise"
"XF86MonBrightnessDown" = "spawn swayosd-client --brightness lower"

[gestures.on-window]
# Cluster-first, matching the keybindings above.
"alt+3-finger-swipe" = "resize-window-snapped"
"alt+shift+3-finger-swipe" = "resize-window"

# The Astal home dashboard, pinned at the canvas origin. `position` is the window
# center (Y-up); tune once you see the dashboard's actual size.
[[window_rules]]
app_id = "drift-dashboard"
position = [0, 0]
widget = true
# No compositor chrome — the dashboard draws its own cards, and the transparent
# gaps between them let the canvas show through.
decoration = "none"
