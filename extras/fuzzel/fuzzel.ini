# Fuzzel as a flat launcher matching swaync's panel: default (rounded) corners, no
# icons, no highlight bar (transparent selection, so the selected row shows the
# same bg as the rest). Three colors — the bg is swaync's panel background
# (rgba(46,46,46,0.7), so the compositor blur shows through), dim-gray entries,
# white for the selected one. Colors are rrggbbaa.

[main]
font=monospace:size=11
icons-enabled=no

[colors]
background=2e2e2eb3
text=b3b3b3ff
input=b3b3b3ff
prompt=b3b3b3ff
match=ffffffff
placeholder=b3b3b3ff
selection=00000000
selection-text=ffffffff
selection-match=ffffffff
border=2e2e2eb3
